<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction History - SpendSense AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="ambient-background">
        <canvas id="particle-canvas"></canvas>
        <div class="color-blob blob-blue"></div>
        <div class="color-blob blob-pink"></div>
    </div>

    <nav class="internal-nav">
        <a href="index.html" class="logo">SpendSense</a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="payment.html">Pay</a>
            <a href="ai_chat.html">AI Chat</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <div class="app-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 class="page-title" style="margin-bottom: 0;">History</h2>
            <button class="btn-account" style="padding: 8px 16px;">Download CSV</button>
        </div>
        
        <div class="transaction-list">
            <a href="transaction.html" class="transaction-item">
                <div class="tx-info">
                    <div class="tx-icon">☕</div>
                    <div class="tx-details">
                        <h4>Starbucks</h4>
                        <p>Today, 9:41 AM</p>
                    </div>
                </div>
                <div class="tx-amount negative">-$5.40</div>
            </a>
            <a href="transaction.html" class="transaction-item">
                <div class="tx-info">
                    <div class="tx-icon">💼</div>
                    <div class="tx-details">
                        <h4>Salary Deposit</h4>
                        <p>Yesterday</p>
                    </div>
                </div>
                <div class="tx-amount positive">+$4,200.00</div>
            </a>
            <a href="transaction.html" class="transaction-item">
                <div class="tx-info">
                    <div class="tx-icon">🛒</div>
                    <div class="tx-details">
                        <h4>Whole Foods</h4>
                        <p>Oct 24, 2023</p>
                    </div>
                </div>
                <div class="tx-amount negative">-$124.50</div>
            </a>
            <a href="transaction.html" class="transaction-item">
                <div class="tx-info">
                    <div class="tx-icon">🎬</div>
                    <div class="tx-details">
                        <h4>Netflix</h4>
                        <p>Oct 22, 2023</p>
                    </div>
                </div>
                <div class="tx-amount negative">-$15.99</div>
            </a>
            <a href="transaction.html" class="transaction-item">
                <div class="tx-info">
                    <div class="tx-icon">💸</div>
                    <div class="tx-details">
                        <h4>Transfer to Alice</h4>
                        <p>Oct 20, 2023</p>
                    </div>
                </div>
                <div class="tx-amount negative">-$50.00</div>
            </a>
        </div>
    </div>

    <script src="particles.js"></script>
</body>
</html>
