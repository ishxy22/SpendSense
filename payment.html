<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - SpendSense AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="ambient-background">
        <canvas id="particle-canvas"></canvas>
        <div class="color-blob blob-blue"></div>
        <div class="color-blob blob-pink"></div>
    </div>

    <nav class="internal-nav">
        <a href="index.html" class="logo">SpendSense</a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="payment.html" class="active">Pay</a>
            <a href="ai_chat.html">AI Chat</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <div class="app-container" style="max-width: 500px;">
        <h2 class="page-title">Send Money</h2>
        
        <div style="background-color: rgba(0,0,0,0.5); padding: 30px; border-radius: 12px; border: 1px solid #333;">
            <div class="form-group">
                <label class="form-label">Recipient (@username or Email)</label>
                <input type="text" class="form-input" placeholder="@janedoe">
            </div>
            <div class="form-group">
                <label class="form-label">Amount ($)</label>
                <input type="number" class="form-input" placeholder="0.00" style="font-size: 2rem; padding: 20px; text-align: center;">
            </div>
            <div class="form-group">
                <label class="form-label">Note (Optional)</label>
                <input type="text" class="form-input" placeholder="Dinner last night">
            </div>
            <button class="btn-primary" style="margin-top: 20px;" onclick="alert('Payment sent successfully!')">Confirm Payment</button>
        </div>
    </div>

    <script src="particles.js"></script>
</body>
</html>
