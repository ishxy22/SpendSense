<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile & Settings - SpendSense AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="ambient-background">
        <canvas id="particle-canvas"></canvas>
        <div class="color-blob blob-blue"></div>
        <div class="color-blob blob-pink"></div>
    </div>

    <nav class="internal-nav">
        <a href="index.html" class="logo">SpendSense</a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="payment.html">Pay</a>
            <a href="ai_chat.html">AI Chat</a>
            <a href="profile.html" class="active">Profile</a>
        </div>
    </nav>

    <div class="app-container" style="max-width: 600px;">
        <h2 class="page-title">Profile & Settings</h2>
        
        <div style="background-color: rgba(0,0,0,0.5); padding: 30px; border-radius: 12px; border: 1px solid #333;">
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                <div style="width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #1d0f63, #851f68); display: flex; align-items: center; justify-content: center; font-size: 2rem;">👤</div>
                <div>
                    <h3 style="margin-bottom: 5px;">John Doe</h3>
                    <p style="color: #a6a6a6;">@johndoe • john@example.com</p>
                </div>
            </div>

            <h4 style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">Preferences</h4>
            
            <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                <label class="form-label" style="margin: 0;">AI Spending Alerts</label>
                <input type="checkbox" checked style="width: 20px; height: 20px;">
            </div>
            <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                <label class="form-label" style="margin: 0;">Dark Mode</label>
                <input type="checkbox" checked disabled style="width: 20px; height: 20px;">
            </div>

            <button class="btn-account" style="width: 100%; margin-top: 20px; padding: 12px; background-color: rgba(255,107,107,0.1); color: #ff6b6b; border: 1px solid #ff6b6b;">Log Out</button>
        </div>
    </div>

    <script src="particles.js"></script>
</body>
</html>
