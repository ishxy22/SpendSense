<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SpendSense AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="ambient-background">
        <canvas id="particle-canvas"></canvas>
        <div class="color-blob blob-blue"></div>
        <div class="color-blob blob-pink"></div>
    </div>

    <nav class="internal-nav">
        <a href="index.html" class="logo">SpendSense</a>
    </nav>

    <div class="app-container" style="max-width: 400px; margin-top: 80px;">
        <h2 class="page-title" style="text-align: center;">Create Account</h2>
        <div style="background-color: rgba(0,0,0,0.5); padding: 30px; border-radius: 12px; border: 1px solid #333;">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-input" placeholder="••••••••">
            </div>
            <a href="home.html" style="text-decoration: none;">
                <button class="btn-primary" style="margin-top: 10px;">Join SpendSense</button>
            </a>
            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #a6a6a6;">
                Already have an account? <a href="#" style="color: #fff;">Sign In</a>
            </p>
        </div>
    </div>

    <script src="particles.js"></script>
</body>
</html>
