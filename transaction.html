<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Details - SpendSense AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="ambient-background">
        <canvas id="particle-canvas"></canvas>
        <div class="color-blob blob-blue"></div>
        <div class="color-blob blob-pink"></div>
    </div>

    <nav class="internal-nav">
        <a href="index.html" class="logo">SpendSense</a>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="payment.html">Pay</a>
            <a href="ai_chat.html">AI Chat</a>
            <a href="profile.html">Profile</a>
        </div>
    </nav>

    <div class="app-container" style="max-width: 500px;">
        <a href="history.html" style="color: #a6a6a6; text-decoration: none; display: inline-block; margin-bottom: 20px;">← Back to History</a>
        
        <div style="background-color: rgba(0,0,0,0.5); padding: 40px; border-radius: 12px; border: 1px solid #333; text-align: center;">
            <div style="width: 60px; height: 60px; border-radius: 50%; background-color: #333; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 20px;">☕</div>
            <h2 style="margin-bottom: 5px;">Starbucks</h2>
            <p style="color: #a6a6a6; margin-bottom: 30px;">Oct 25, 2023 at 9:41 AM</p>
            
            <div style="font-size: 3rem; font-weight: 600; margin-bottom: 40px;">$5.40</div>

            <div style="text-align: left; border-top: 1px dashed #404040; padding-top: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="color: #a6a6a6;">Status</span>
                    <span>Completed</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="color: #a6a6a6;">Category</span>
                    <span>Food & Dining</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="color: #a6a6a6;">Payment Method</span>
                    <span>Apple Pay •••• 1234</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="color: #a6a6a6;">Transaction ID</span>
                    <span style="font-family: monospace;">TX-987654321</span>
                </div>
            </div>
            
            <button class="btn-account" style="width: 100%; margin-top: 30px; padding: 12px;">Report Issue</button>
        </div>
    </div>

    <script src="particles.js"></script>
</body>
</html>
